<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050507">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="精选 AI 影像、商品视觉与短视频作品，覆盖服装展示、商业口播、产品广告、城市影像与国风叙事。">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Motion Works">
  <meta property="og:title" content="精选动态作品｜AI 视频作品集">
  <meta property="og:description" content="AI 影像、商品视觉与短视频精选作品。">
  <meta property="og:url" content="https://works.devs.surf/">
  <meta property="og:image" content="https://works.devs.surf/thumbnails/1_thumb.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="精选动态作品｜AI 视频作品集">
  <meta name="twitter:description" content="AI 影像、商品视觉与短视频精选作品。">
  <meta name="twitter:image" content="https://works.devs.surf/thumbnails/1_thumb.jpg">
  <link rel="canonical" href="https://works.devs.surf/">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preload" href="thumbnails/1_thumb.jpg" as="image" fetchpriority="high">
  <link rel="stylesheet" href="assets/styles.css">
  <title>精选动态作品｜AI 视频作品集</title>
</head>
<body>
  <div class="preloader" id="preloader" aria-hidden="true">
    <span class="preloader__mark">M</span>
    <span class="preloader__line"></span>
  </div>

  <canvas id="atmosphere" class="atmosphere" aria-hidden="true"></canvas>
  <div class="aurora" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>
  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <header class="site-header" id="siteHeader">
    <a class="wordmark" href="#top" aria-label="返回页面顶部">
      <span class="wordmark__dot"></span>
      <span>MOTION WORKS</span>
    </a>
    <div class="header-meta" aria-label="作品统计">
      <span id="headerCount">13 FILMS</span>
      <span class="header-meta__divider"></span>
      <span>VISUAL ARCHIVE</span>
    </div>
  </header>

  <main id="top">
    <section class="gallery-section" id="works" aria-labelledby="worksTitle">
      <div class="section-heading">
        <div>
          <p class="eyebrow">CURATED AI VIDEO · SELECTED WORKS</p>
          <h1 id="worksTitle">精选动态作品</h1>
          <p class="section-intro">横屏与竖屏影像作品集合，点击任意封面即可播放。</p>
        </div>
        <div class="filters" role="group" aria-label="按画幅筛选作品">
          <button class="filter is-active" type="button" data-filter="all" aria-pressed="true">全部作品</button>
          <button class="filter" type="button" data-filter="landscape" aria-pressed="false">横屏影像</button>
          <button class="filter" type="button" data-filter="portrait" aria-pressed="false">竖屏短片</button>
        </div>
      </div>

      <div class="gallery" id="gallery" aria-live="polite"></div>
      <p class="empty-state" id="emptyState" hidden>当前分类暂无作品。</p>
    </section>
  </main>

  <footer class="site-footer" id="siteFooter">
    <span>精选动态作品</span>
    <span>VISUAL ARCHIVE · 2026</span>
  </footer>

  <div class="player" id="player" role="dialog" aria-modal="true" aria-labelledby="playerTitle" aria-hidden="true">
    <div class="player__backdrop" data-close-player></div>
    <div class="player__shell">
      <header class="player__header">
        <div>
          <p class="player__index" id="playerIndex">FILM 01 / 13</p>
          <h2 id="playerTitle">MOTION 01</h2>
        </div>
        <button class="icon-button player__close" id="playerClose" type="button" aria-label="关闭播放器">
          <span></span><span></span>
        </button>
      </header>

      <div class="player__stage" id="playerStage">
        <div class="player__loading" id="playerLoading" aria-live="polite">
          <span></span>
          <p>LOADING FILM</p>
        </div>
        <video id="mainVideo" controls playsinline webkit-playsinline preload="metadata"></video>
        <div class="player__error" id="playerError" role="status" hidden>
          <p>视频加载较慢或连接失败。</p>
          <button id="playerRetry" type="button">重新加载</button>
        </div>
      </div>

      <footer class="player__footer">
        <button class="player-nav" id="playerPrev" type="button" aria-label="播放上一个作品">
          <span>←</span><small>PREVIOUS</small>
        </button>
        <div class="player__meta">
          <span id="playerDuration">15.0 SEC</span>
          <span id="playerFormat">LANDSCAPE</span>
        </div>
        <button class="player-nav player-nav--next" id="playerNext" type="button" aria-label="播放下一个作品">
          <small>NEXT</small><span>→</span>
        </button>
      </footer>
    </div>
  </div>

  <noscript><div class="noscript">请启用 JavaScript 以浏览和播放作品。</div></noscript>
  <script src="assets/data.js" defer></script>
  <script src="assets/app.js" defer></script>
</body>
</html>
